# Build and push Docker image to DockerHub when a tag is pushed.
# Environment is determined by which branch contains the tag's commit:
# - main  -> Prod image (tag + optional 'latest')
# - test  -> Test image (tag only)
# - both  -> Prod (main takes precedence)
# - neither -> job is skipped
#
# Required GitHub secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Set DOCKER_IMAGE_REPO below (e.g. languageapp-phrasal-verbs) to match your Docker Hub repo name.

name: Build and push Docker image

on:
  push:
    tags:
      - '*'

env:
  DOCKER_IMAGE_REPO: languageapp-phrasal-verbs  # Docker Hub repository name (without username)

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.branch.outputs.environment }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Fetch main and test branches
        run: git fetch origin main test 2>/dev/null || true

      - name: Resolve branch from tag
        id: branch
        run: |
          SHA="${{ github.sha }}"
          BRANCHES=$(git branch -r --contains "$SHA" 2>/dev/null || true)
          if echo "$BRANCHES" | grep -q 'origin/main'; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          elif echo "$BRANCHES" | grep -q 'origin/test'; then
            echo "environment=test" >> "$GITHUB_OUTPUT"
          else
            echo "environment=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Set tag name
        id: meta
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  build-push:
    needs: resolve
    if: needs.resolve.outputs.environment != 'skip'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_REPO }}"
          TAG_NAME="${{ needs.resolve.outputs.tag_name }}"
          ENV="${{ needs.resolve.outputs.environment }}"
          TAGS="${IMAGE}:${TAG_NAME}"
          if [ "$ENV" = "prod" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
